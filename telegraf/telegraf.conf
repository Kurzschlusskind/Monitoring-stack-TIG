# Telegraf Configuration
# Monitoring stack for Raspberry Pi 5

[global_tags]
  host = "$HOSTNAME"

[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "15s"
  flush_jitter = "5s"
  precision = ""
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb]]
  urls = ["http://localhost:8086"]
  database = "telegraf"
  skip_database_creation = false
  timeout = "5s"
  retention_policy = ""

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# CPU usage per core and total
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false

# RAM usage, available, cached, buffered
[[inputs.mem]]

# Disk usage per mount point
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Disk I/O read/write bytes and IOPS
[[inputs.diskio]]

# Network I/O per interface
[[inputs.net]]

# System load, uptime, number of CPUs
[[inputs.system]]

# CPU/SoC temperature (critical for Pi 5)
[[inputs.temp]]

# Process count by state
[[inputs.processes]]

# Docker container metrics
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  source_tag = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = true
  perdevice_include = ["cpu", "blkio", "network"]
  total = true
  total_include = ["cpu", "blkio", "network"]
  docker_label_include = []
  docker_label_exclude = []

# ICMP ping RTT and packet loss
[[inputs.ping]]
  urls = ["8.8.8.8", "1.1.1.1", "9.9.9.9"]
  method = "native"
  count = 3
  ping_interval = 1.0
  timeout = 2.0
  deadline = 10
  interval = "30s"

# DNS resolution time
[[inputs.dns_query]]
  servers = ["9.9.9.9", "8.8.8.8"]
  domains = ["google.com"]
  record_type = "A"
  port = 53
  timeout = 2
